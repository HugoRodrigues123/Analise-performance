<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Frota</title>
  <link rel="stylesheet" href="situacao-veiculos.css?v=20260515-13">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="comum.js?v=20260515-04" defer></script>
  <script src="situacao-veiculos.js?v=20260513-01" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 17h4V5H2v12h3"></path><path d="M14 9h4l4 4v4h-3"></path><circle cx="7.5" cy="17.5" r="2.5"></circle><circle cx="16.5" cy="17.5" r="2.5"></circle>
      </svg>
      <div>
        <div class="topbar-title">Controle de Frota</div>
        <div class="topbar-sub">Cadastro e situação operacional dos veículos</div>
      </div>
    </div>
    <div class="topbar-actions">
      <a class="btn btn-sm" href="index.html">Performance</a>
      <a class="btn btn-sm" href="cadastros.html">Cadastros</a>
      <a class="btn btn-sm" href="controle-motoristas.html">Motoristas</a>
      <a class="btn btn-sm" href="controle-ficha.html">Controle de Ficha</a>
      <a class="btn btn-sm" href="ofensores.html">Diagnóstico</a>
      <a class="btn btn-sm" href="multas.html">Multas</a>
      <a class="btn btn-sm" href="advertencias.html">Advertências</a>
      <a class="btn btn-sm" href="registro-ocorrencia.html">Ocorrências</a>
      <a class="btn btn-sm" href="planejamentos.html">Planejamentos</a>
      <a class="btn btn-sm" href="controle-telemetria.html">Controle de Equipamentos</a>
    </div>
  </div>

  <main class="page">
    <section class="card">
      <div class="card-header">
        <span class="card-title">Controle de Frota</span>
        <div class="actions-row">
          <button class="btn btn-sm" type="button" onclick="limparBuscaSituacaoVeiculos()">Limpar Busca</button>
        </div>
      </div>
      <div class="dashboard-grid">
        <div class="metric-card">
          <div class="metric-lbl">Veículos cadastrados</div>
          <div class="metric-val"><span id="sit-kpi-total">0</span></div>
        </div>
        <div class="metric-card">
          <div class="metric-lbl">Regulares</div>
          <div class="metric-val"><span id="sit-kpi-regular">0</span></div>
        </div>
        <div class="metric-card">
          <div class="metric-lbl">Irregulares</div>
          <div class="metric-val"><span id="sit-kpi-pendente">0</span></div>
        </div>
      </div>
      <div class="ops-grid spaced">
        <div class="field"><label for="sit-busca-placa">Placa</label><select id="sit-busca-placa" onchange="renderizarSituacaoVeiculos()"></select></div>
        <div class="field"><label for="sit-busca-fabricante">Fabricante</label><select id="sit-busca-fabricante" onchange="renderizarSituacaoVeiculos()"></select></div>
        <div class="field"><label for="sit-busca-modelo">Modelo</label><select id="sit-busca-modelo" onchange="renderizarSituacaoVeiculos()"></select></div>
        <div class="field"><label for="sit-busca-tracao">Tração</label><select id="sit-busca-tracao" onchange="renderizarSituacaoVeiculos()"></select></div>
        <div class="field">
          <label for="sit-busca-status">Status</label>
          <select id="sit-busca-status" onchange="renderizarSituacaoVeiculos()">
            <option value="">Todos</option>
            <option value="Regular">Regular</option>
            <option value="Irregular">Irregular</option>
          </select>
        </div>
      </div>
      <div id="situacao-lista" class="ops-list"></div>
    </section>
  </main>

  <div class="modal-backdrop" id="frota-edicao-modal" aria-hidden="true">
    <div class="modal-panel modal-panel-wide" role="dialog" aria-modal="true" aria-labelledby="frota-edicao-titulo">
      <div class="card-header">
        <div>
          <span class="card-title" id="frota-edicao-titulo">Editar Controle de Frota</span>
          <div class="section-note" id="frota-edicao-subtitulo"></div>
        </div>
        <button class="btn btn-sm" type="button" onclick="fecharEdicaoFrota()">Fechar</button>
      </div>
      <div id="frota-edicao-corpo"></div>
      <div class="modal-actions">
        <button class="btn btn-sm" type="button" onclick="fecharEdicaoFrota()">Cancelar</button>
        <button class="btn btn-sm btn-green" type="button" onclick="salvarEdicaoFrota()">Salvar</button>
      </div>
    </div>
  </div>
</body>
</html>
