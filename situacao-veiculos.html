<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Frota</title>
  <link rel="stylesheet" href="style.css?v=20260507-01">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="comum.js?v=20260506-14" defer></script>
  <script src="situacao-veiculos.js?v=20260506-14" defer></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 17h4V5H2v12h3"></path><path d="M14 9h4l4 4v4h-3"></path><circle cx="7.5" cy="17.5" r="2.5"></circle><circle cx="16.5" cy="17.5" r="2.5"></circle>
      </svg>
      <div>
        <div class="topbar-title">Controle de Frota</div>
        <div class="topbar-sub">Cadastro e situação operacional dos veículos</div>
      </div>
    </div>
    <div class="topbar-actions">
      <a class="btn btn-sm" href="index.html">Performance</a>
      <a class="btn btn-sm" href="cadastros.html">Cadastros</a>
      <a class="btn btn-sm" href="controle-motoristas.html">Motoristas</a>
      <a class="btn btn-sm" href="controle-ficha.html">Controle de Ficha</a>
      <a class="btn btn-sm" href="situacao-veiculos.html">Controle de Frota</a>
      <a class="btn btn-sm" href="ofensores.html">Diagnóstico</a>
      <a class="btn btn-sm" href="multas.html">Multas</a>
      <a class="btn btn-sm" href="advertencias.html">Advertências</a>
      <a class="btn btn-sm" href="avarias.html">Avarias</a>
      <a class="btn btn-sm" href="registro-ocorrencia.html">Ocorrências</a>
      <button class="btn btn-sm btn-blue" type="button" onclick="exportarExcel()">Excel</button>
      <button class="btn btn-sm btn-green" type="button" onclick="exportarPDF()">PDF</button>
    </div>
  </div>

  <main class="page">
    <section class="card">
      <div class="card-header">
        <span class="card-title">Controle de Frota</span>
        <div class="actions-row">
          <button class="btn btn-sm" type="button" onclick="limparBuscaSituacaoVeiculos()">Limpar Busca</button>
        </div>
      </div>
      <div class="dashboard-grid">
        <div class="metric-card">
          <div class="metric-lbl">Veículos cadastrados</div>
          <div class="metric-val"><span id="sit-kpi-total">0</span></div>
        </div>
        <div class="metric-card">
          <div class="metric-lbl">Regulares</div>
          <div class="metric-val"><span id="sit-kpi-regular">0</span></div>
        </div>
        <div class="metric-card">
          <div class="metric-lbl">Em atenção</div>
          <div class="metric-val"><span id="sit-kpi-pendente">0</span></div>
        </div>
      </div>
      <div class="ops-grid spaced">
        <div class="field"><label for="sit-busca-placa">Placa</label><input type="text" id="sit-busca-placa" oninput="renderizarSituacaoVeiculos()"></div>
        <div class="field"><label for="sit-busca-fabricante">Fabricante</label><input type="text" id="sit-busca-fabricante" oninput="renderizarSituacaoVeiculos()"></div>
        <div class="field"><label for="sit-busca-modelo">Modelo</label><input type="text" id="sit-busca-modelo" oninput="renderizarSituacaoVeiculos()"></div>
        <div class="field">
          <label for="sit-busca-status">Status</label>
          <select id="sit-busca-status" onchange="renderizarSituacaoVeiculos()">
            <option value="">Todos</option>
            <option value="Regular">Regular</option>
            <option value="Atenção">Atenção</option>
          </select>
        </div>
      </div>
      <div id="situacao-lista" class="ops-list"></div>
    </section>
  </main>
</body>
</html>
